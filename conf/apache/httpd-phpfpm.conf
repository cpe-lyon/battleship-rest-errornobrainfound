# Proxy vers le conteneur PHP-FPM pour tous les fichiers .php
<FilesMatch "\.php$">
    SetHandler "proxy:fcgi://phpfpm:9000"
</FilesMatch>

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        # Nécessaire pour que mod_rewrite fonctionne via .htaccess
        AllowOverride All
        Options +Indexes +FollowSymLinks
        Require all granted
    </Directory>

    # Logs vers stdout/stderr (Docker-friendly)
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>