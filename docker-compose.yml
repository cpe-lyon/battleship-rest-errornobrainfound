services:
  apache:
    build:
      context: ./conf/apache
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - phpfpm
    networks:
      - projet-inge-web

  phpfpm:
    build:
      context: ./conf/phpfpm
    volumes:
      - ./src:/var/www/html
    networks:
      - projet-inge-web
    environment:
      - HOST_UID=${HOST_UID:-1000}
    command: sh -c "chown -R $${HOST_UID}:www-data /var/www/html/ && chmod -R g+w /var/www/html && php-fpm"
  # sqlite-web:
  #   container_name: sqlite-web-client
